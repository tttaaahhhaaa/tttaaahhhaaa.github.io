<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteamToolsLua</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:#05050a;color:#e8e8f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.25;animation:float 20s infinite ease-in-out}
.bg .orb:nth-child(1){width:600px;height:600px;background:#7c6fff;top:-200px;left:-200px}
.bg .orb:nth-child(2){width:500px;height:500px;background:#b098ff;bottom:-150px;right:-150px;animation-delay:-7s}
.bg .orb:nth-child(3){width:400px;height:400px;background:#4a3fbf;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0)scale(1)}25%{transform:translate(60px,-40px)scale(1.08)}50%{transform:translate(-30px,50px)scale(.95)}75%{transform:translate(40px,30px)scale(1.05)}}
.grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(124,111,255,.04)1px,transparent 1px),linear-gradient(90deg,rgba(124,111,255,.04)1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.container{position:relative;z-index:1;max-width:680px;width:100%;text-align:center}
.hero{background:rgba(15,15,30,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(124,111,255,.15);border-radius:24px;padding:48px 40px;box-shadow:0 0 80px rgba(124,111,255,.08);animation:fadeUp .8s ease-out;margin-bottom:20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo{width:72px;height:72px;background:linear-gradient(135deg,#7c6fff,#b098ff);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px;box-shadow:0 0 40px rgba(124,111,255,.25);animation:pulse 3s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(124,111,255,.25)}50%{box-shadow:0 0 60px rgba(124,111,255,.45)}}
h1{font-size:34px;font-weight:800;background:linear-gradient(135deg,#e8e8f8,#b098ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.sub{color:#8880b0;font-size:14px;margin-bottom:24px}
.ver-block{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px}
.ver-block .ver-num{font-size:36px;font-weight:800;color:#7c6fff}
.ver-block .ver-date{font-size:13px;color:#585880;text-align:left}
.ver-block .ver-date span{display:block;margin-top:2px;color:#3a6a5a;font-size:12px}
.dl{display:inline-flex;align-items:center;gap:10px;padding:16px 40px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c6fff,#6a5ee6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .25s;box-shadow:0 0 30px rgba(124,111,255,.2)}
.dl:hover{transform:translateY(-3px);box-shadow:0 0 50px rgba(124,111,255,.35)}
.dl .sz{font-size:12px;font-weight:500;opacity:.7}
.dl .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.features{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.features span{padding:6px 14px;border-radius:8px;background:rgba(124,111,255,.08);border:1px solid rgba(124,111,255,.12);color:#b098ff;font-size:12px;font-weight:500}
.err{color:#f56565;font-size:14px;margin-bottom:12px}
footer{position:relative;z-index:1;margin-top:12px;color:#484860;font-size:13px}
footer a{color:#7c6fff;text-decoration:none}
footer a:hover{text-decoration:underline}
@media(max-width:480px){
.hero{padding:32px 24px}
h1{font-size:26px}
.ver-block{flex-direction:column;gap:6px}
.ver-block .ver-num{font-size:28px}
.ver-block .ver-date{text-align:center}
.dl{padding:14px 28px;font-size:14px}
}
</style>
</head>
<body>
<div class="bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="grid"></div>

<div class="container">
  <div class="hero">
    <div class="logo">&#9889;</div>
    <h1>SteamToolsLua</h1>
    <p class="sub">All-in-One Injector &middot; CloudRedirect &middot; Auto-Update</p>
    <div class="ver-block">
      <div class="ver-num" id="ver"><span class="spin" style="width:28px;height:28px;display:inline-block;border-width:3px"></span></div>
      <div class="ver-date">
        <span id="releaseLabel">Loading...</span>
        <span id="dateLabel"></span>
      </div>
    </div>
    <a class="dl" id="dl" href="#">
      <span>&#11015;</span>
      <span>Download</span>
      <span class="sz" id="sz"></span>
    </a>
    <div class="features">
      <span>Auto-Inject</span>
      <span>CloudRedirect</span>
      <span>Bypass</span>
      <span>Batch DL</span>
    </div>
  </div>
</div>
<footer><a href="https://github.com/tttaaahhhaaa/SteamToolsLua" target="_blank">GitHub</a> &middot; <a href="https://tttaaahhhaaa.github.io/admin/" target="_blank">Admin</a></footer>
<script>
(async()=>{
  try{
    const r=await fetch('https://api.github.com/repos/tttaaahhhaaa/SteamToolsLua/releases/latest',{headers:{'User-Agent':'STL'}});
    if(!r.ok)throw Error();
    const d=await r.json();
    const v=(d.tag_name||'').replace(/^v/i,'')||'?';
    document.getElementById('ver').textContent='v'+v;
    document.getElementById('releaseLabel').textContent='Latest Release';
    const a=d.assets&&d.assets[0];
    if(a){document.getElementById('dl').href=a.browser_download_url;document.getElementById('sz').textContent='('+(a.size/1048576).toFixed(1)+' MB)'}
    else document.getElementById('dl').href=d.html_url;
    if(d.published_at)document.getElementById('dateLabel').textContent=new Date(d.published_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})
  }catch(e){
    document.getElementById('ver').innerHTML='<span class="err">Failed to load</span>';
    document.getElementById('releaseLabel').textContent='Check GitHub for latest';
    document.getElementById('dl').href='https://github.com/tttaaahhhaaa/SteamToolsLua/releases'
  }
})()
</script>
</body>
</html>
