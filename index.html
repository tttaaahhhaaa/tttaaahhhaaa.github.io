<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteamToolsLua</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080e;color:#e0e0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center;padding:20px}
.container{max-width:600px;width:100%;text-align:center}
h1{font-size:36px;color:#b098ff;margin-bottom:8px;font-weight:700}
.sub{color:#686880;font-size:15px;margin-bottom:30px}
.card{background:#0a0a16;border:1px solid #1a1a38;border-radius:12px;padding:32px;margin-bottom:16px}
.dl{display:inline-flex;align-items:center;gap:10px;padding:14px 36px;border-radius:8px;border:none;background:linear-gradient(135deg,#7c6fff,#b098ff);color:#fff;font-size:16px;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .2s}
.dl:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,111,255,.3)}
.dl .sz{font-size:12px;font-weight:400;opacity:.7}
.spin{display:inline-block;width:20px;height:20px;border:3px solid #2a2a5a;border-top-color:#7c6fff;border-radius:50%;animation:s .6s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.err{color:#f56565}
footer{margin-top:40px;color:#585878;font-size:12px}
footer a{color:#7c6fff;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <h1>SteamToolsLua</h1>
  <p class="sub">All-in-One Injector + CloudRedirect</p>
  <div class="card">
    <a class="dl" id="dl" href="#"><span>&#11015;</span> Download <span class="sz" id="sz"></span></a>
  </div>
</div>
<footer><a href="https://github.com/tttaaahhhaaa/SteamToolsLua" target="_blank">GitHub</a></footer>
<script>
(async()=>{
  try{
    const r=await fetch('https://api.github.com/repos/tttaaahhhaaa/SteamToolsLua/releases/latest',{headers:{'User-Agent':'STL'}});
    if(!r.ok)throw Error();
    const d=await r.json();
    const a=d.assets&&d.assets[0];
    if(a){document.getElementById('dl').href=a.browser_download_url;document.getElementById('sz').textContent='('+(a.size/1048576).toFixed(1)+' MB)'}
    else document.getElementById('dl').href=d.html_url;
  }catch(e){
    document.getElementById('dl').href='https://github.com/tttaaahhhaaa/SteamToolsLua/releases'
  }
})()
</script>
</body>
</html>
